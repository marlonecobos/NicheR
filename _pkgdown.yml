    - text: "Functions"
      href: reference/index.html
    - icon: fas fa-book
      text: "Articles"
      menu:
      -  text: "1. Build ellipsoid"
         href: articles/creating_ellipsoid_based_niches.html
      -  text: "2. Make a Prediction"
         href: articles/predict.html
      -  text: "3. Generate Occurence Data"
         href: articles/generating_occurrence.html
      -  text: "4. Working With Bias"
         href: articles/bias.html
      -  text: "5. Virtual Community Simulations"
         href: articles/virtual_communities.html
      -  text: "6. Plotting"
         href: articles/plotting_vignette.html
  components:
    home: ~


